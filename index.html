bash
cat > /tmp/part1.html << 'EOF'
<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Leveling</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
[data-theme="dark"]{--bg:#080809;--surface:#0f1011;--surface2:#161718;--surface3:#1e2022;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#e8e8e8;--text2:#8a8a95;--muted:#4a4a55;--accent:#4ade80;--accent2:#22c55e;--gold:#f59e0b;--red:#ef4444;}
[data-theme="light"]{--bg:#f0f0f3;--surface:#ffffff;--surface2:#f5f5f8;--surface3:#eaeaed;--border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.11);--text:#18181f;--text2:#55555e;--muted:#909099;--accent:#16a34a;--accent2:#15803d;--gold:#d97706;--red:#dc2626;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;}

/* CONFIG */
#config-panel{max-width:420px;margin:0 auto;padding:4rem 1.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;}
.config-logo{font-size:3rem;margin-bottom:1rem;filter:drop-shadow(0 0 20px rgba(74,222,128,.4));}
#config-panel h1{font-size:1.8rem;font-weight:700;letter-spacing:-.04em;margin-bottom:.3rem;background:linear-gradient(135deg,#4ade80,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{color:var(--text2);font-size:.85rem;margin-bottom:2rem;line-height:1.6;}
.field{width:100%;margin-bottom:1rem;text-align:left;}
.field label{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:.8rem 1rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,222,128,.12);}
.btn-primary{width:100%;background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;padding:.9rem;cursor:pointer;margin-top:.5rem;transition:opacity .2s,transform .15s;letter-spacing:-.01em;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}
#error-msg{color:#ef4444;font-size:.8rem;margin-top:.75rem;display:none;line-height:1.6;padding:.6rem .8rem;background:rgba(239,68,68,.08);border-radius:10px;border:1px solid rgba(239,68,68,.2);}
#loading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.2rem;}
.spinner{width:36px;height:36px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-size:.85rem;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg);}}

/* DASHBOARD */
#dashboard{display:none;}
.tab-bar{display:flex;gap:1px;background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem .8rem 0;position:sticky;top:0;z-index:50;overflow-x:auto;backdrop-filter:blur(12px);}
.tab-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;padding:.45rem .7rem;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;border-radius:6px 6px 0 0;letter-spacing:-.01em;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.tab-content{display:none;padding:1rem 1rem 6rem;max-width:860px;margin:0 auto;}
.tab-content.active{display:block;}

/* TOPBAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:8px;padding-top:.6rem;}
.top-bar-title{font-size:1rem;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:6px;}
.top-bar-sub{font-size:.7rem;color:var(--muted);margin-top:1px;}
.top-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.icon-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:9px;font-size:.73rem;padding:.36rem .65rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;display:flex;align-items:center;gap:4px;}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.spinning{animation:spin .7s linear infinite;}

/* SECTIONS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin-bottom:10px;transition:border-color .2s;}
.card-title{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.11em;margin-bottom:.85rem;font-weight:600;}

/* AUTO MSG */
.auto-msg{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:10px;font-size:.8rem;color:var(--text2);font-style:italic;line-height:1.65;position:relative;overflow:hidden;}
.auto-msg::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.auto-msg strong{color:var(--text);font-style:normal;}

/* HERO RING */
.hero-row{display:grid;grid-template-columns:155px 1fr;gap:10px;margin-bottom:10px;}
.ring-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;position:relative;overflow:hidden;}
.ring-box::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(74,222,128,.04),transparent 70%);pointer-events:none;}
.ring-wrap{position:relative;width:118px;height:118px;}
.ring-wrap canvas{position:absolute;top:0;left:0;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.ring-pct{font-size:1.75rem;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.05em;}
.ring-lbl{font-size:.54rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.ring-detail{font-size:.68rem;color:var(--text2);text-align:center;}
.ring-sub{font-size:.65rem;color:var(--accent);font-weight:600;text-align:center;}
.today-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1rem;}
.habits-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.habit-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:.4rem .6rem;font-size:.75rem;transition:all .15s;}
.habit-chip.done{background:rgba(255,255,255,.025);}
.h-dot{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--muted);flex-shrink:0;transition:all .15s;}

/* THRESHOLD */
.threshold{border-radius:10px;padding:.55rem .9rem;font-size:.75rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;letter-spacing:-.01em;}
.threshold.success{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.22);color:#22c55e;}
.threshold.warn{background:rgba(234,179,8,.09);border:1px solid rgba(234,179,8,.22);color:#ca8a04;}
.threshold.fail{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.22);color:#ef4444;}

/* XP */
.xp-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin-bottom:10px;}
.xp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.xp-name{font-size:.92rem;font-weight:700;letter-spacing:-.02em;}
.rank-pill{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:14px;}
.xp-bar-bg{background:var(--surface2);border-radius:5px;height:7px;overflow:hidden;margin-bottom:5px;}
.xp-bar{height:100%;border-radius:5px;transition:width 1.3s cubic-bezier(.4,0,.2,1);}
.xp-meta{display:flex;justify-content:space-between;font-size:.62rem;color:var(--muted);font-family:'DM Mono',monospace;}
.xp-breakdown{margin-top:8px;padding:.6rem .8rem;background:var(--surface2);border-radius:9px;font-size:.68rem;line-height:1.85;color:var(--text2);}
.xp-breakdown strong{color:var(--text);}
.ranks-panel{display:none;margin-top:8px;border-radius:11px;overflow:hidden;border:1px solid var(--border);}
.ranks-panel.open{display:block;}
.rank-row{display:flex;align-items:center;gap:10px;padding:.6rem .9rem;border-bottom:1px solid var(--border);}
.rank-row:last-child{border-bottom:none;}
.rank-row.cur{background:var(--surface3);}
.rr-bar{height:3px;border-radius:2px;margin-top:4px;background:var(--surface3);overflow:hidden;}
.rr-fill{height:100%;border-radius:2px;}

/* BOSS */
.boss-card{background:linear-gradient(145deg,#09071a,#070d18,#0a0f16);border:1px solid rgba(139,92,246,.3);border-radius:18px;padding:1.3rem;margin-bottom:10px;position:relative;overflow:hidden;}
[data-theme="light"] .boss-card{background:linear-gradient(145deg,#f5f0ff,#f0f4ff,#f0f8ff);border-color:rgba(109,40,217,.25);}
.boss-glow1{position:absolute;top:-80px;right:-80px;width:220px;height:220px;background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);pointer-events:none;}
.boss-glow2{position:absolute;bottom:-60px;left:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(236,72,153,.07),transparent 70%);pointer-events:none;}
.boss-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.boss-ico{font-size:2.2rem;filter:drop-shadow(0 0 12px rgba(139,92,246,.7));flex-shrink:0;line-height:1;}
.boss-meta{flex:1;}
.boss-week{font-size:.58rem;color:#a78bfa;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px;}
.boss-name{font-size:1.05rem;font-weight:700;color:#ede9fe;line-height:1.2;margin-bottom:5px;}
[data-theme="light"] .boss-name{color:#4c1d95;}
.boss-diff{display:inline-flex;align-items:center;font-size:.63rem;font-weight:700;padding:3px 10px;border-radius:14px;letter-spacing:.02em;}
.boss-lore{font-size:.77rem;color:#c4b5fd;line-height:1.65;margin-bottom:12px;font-style:italic;border-left:2px solid rgba(139,92,246,.3);padding-left:.75rem;}
[data-theme="light"] .boss-lore{color:#6d28d9;}
.boss-cl-wrap{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.18);border-radius:11px;padding:.8rem;margin-bottom:10px;}
.boss-cl-title{font-size:.58rem;color:#a78bfa;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;font-weight:600;}
.boss-cl{display:flex;flex-direction:column;gap:6px;}
.boss-ci{display:flex;align-items:center;gap:8px;font-size:.77rem;color:#ede9fe;padding:2px 0;}
[data-theme="light"] .boss-ci{color:#4c1d95;}
.boss-ci input[type=checkbox]{width:14px;height:14px;accent-color:#8b5cf6;cursor:pointer;flex-shrink:0;}
.boss-ci label{cursor:pointer;line-height:1.4;}
.boss-ci.checked label{text-decoration:line-through;opacity:.45;}
.boss-hp-section{margin-top:10px;}
.boss-hp-lbl{display:flex;justify-content:space-between;font-size:.62rem;color:#a78bfa;margin-bottom:4px;font-family:'DM Mono',monospace;}
.boss-hp-track{background:rgba(0,0,0,.35);border-radius:6px;height:9px;overflow:hidden;}
[data-theme="light"] .boss-hp-track{background:rgba(109,40,217,.1);}
.boss-hp-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#7c3aed,#a855f7,#ec4899);transition:width 1s ease;}
.boss-won{font-size:.78rem;font-weight:700;color:#4ade80;text-align:center;margin-top:9px;padding:.5rem;background:rgba(74,222,128,.09);border-radius:9px;border:1px solid rgba(74,222,128,.2);}
.boss-failed{font-size:.78rem;font-weight:700;color:#f87171;text-align:center;margin-top:9px;padding:.5rem;background:rgba(248,113,113,.09);border-radius:9px;border:1px solid rgba(248,113,113,.2);}
.boss-btns{display:flex;gap:7px;margin-top:9px;}
.boss-btn{flex:1;border:none;border-radius:9px;padding:.52rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.78rem;transition:all .18s;}
.boss-btn.win{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);color:#4ade80;}
.boss-btn.win:hover{background:rgba(34,197,94,.25);}
.boss-btn.lose{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:#f87171;}
.boss-btn.lose:hover{background:rgba(248,113,113,.2);}

/* QUESTS */
.quest-list{display:flex;flex-direction:column;gap:7px;}
.quest-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.85rem;transition:border-color .15s;}
.quest-item.q-done{border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.03);}
.quest-item.q-fail{border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.03);}
.quest-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.quest-ico{font-size:1rem;flex-shrink:0;}
.quest-nm{font-size:.8rem;font-weight:600;flex:1;letter-spacing:-.01em;}
.quest-badge{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;}
.quest-badge.easy{background:rgba(34,197,94,.12);color:#22c55e;}
.quest-badge.medium{background:rgba(234,179,8,.12);color:#ca8a04;}
.quest-badge.hard{background:rgba(239,68,68,.12);color:#ef4444;}
.quest-desc{font-size:.72rem;color:var(--text2);line-height:1.55;margin-bottom:7px;}
.quest-ftr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.quest-rew{font-size:.68rem;color:var(--gold);font-weight:600;font-family:'DM Mono',monospace;}
.quest-acts{display:flex;gap:4px;flex-wrap:wrap;}
.qb{border:1px solid var(--border2);color:var(--text);border-radius:7px;font-size:.67rem;padding:.25rem .55rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;background:var(--surface3);}
.qb:hover{background:var(--surface2);}
.qb.ok{background:rgba(74,222,128,.1);color:#4ade80;border-color:rgba(74,222,128,.28);}
.qb.ko{background:rgba(248,113,113,.08);color:#f87171;border-color:rgba(248,113,113,.22);}
.qb.rst{background:rgba(139,92,246,.07);color:#a78bfa;border-color:rgba(139,92,246,.22);}

/* ATTRIBUTES */
.attr-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin-bottom:10px;transition:border-color .2s;}
.attr-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.attr-emoji{font-size:1.6rem;flex-shrink:0;line-height:1;}
.attr-title{flex:1;}
.attr-name{font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
.attr-desc{font-size:.67rem;color:var(--text2);margin-top:1px;line-height:1.4;}
.attr-lvl{font-family:'DM Mono',monospace;font-size:.98rem;font-weight:700;padding:4px 11px;border-radius:10px;flex-shrink:0;}
.attr-bar-meta{display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-bottom:3px;font-family:'DM Mono',monospace;}
.attr-bar-bg{background:var(--surface2);border-radius:5px;height:6px;overflow:hidden;margin-bottom:6px;}
.attr-bar-fill{height:100%;border-radius:5px;transition:width 1s ease;}
.attr-note{font-size:.6rem;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.attr-subs{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:9px;}
.sub-card{background:var(--surface2);border-radius:10px;padding:.65rem .75rem;border:1px solid var(--border);}
.sub-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.sub-nm{font-size:.68rem;font-weight:600;letter-spacing:-.01em;}
.sub-lvl{font-size:.63rem;font-family:'DM Mono',monospace;font-weight:700;padding:1px 7px;border-radius:8px;}
.sub-bar-bg{background:var(--surface3);border-radius:3px;height:4px;overflow:hidden;margin-bottom:3px;}
.sub-bar-fill{height:100%;border-radius:3px;transition:width .9s ease;}
.sub-pa{font-size:.58rem;color:var(--muted);line-height:1.4;}
.attr-how{background:var(--surface2);border-radius:9px;padding:.58rem .75rem;font-size:.65rem;color:var(--text2);line-height:1.75;margin-bottom:6px;}
.attr-how strong{color:var(--text);}
.attr-goal{background:rgba(74,222,128,.05);border:1px solid rgba(74,222,128,.14);border-radius:9px;padding:.52rem .75rem;font-size:.65rem;color:var(--accent);line-height:1.6;}
[data-theme="light"] .attr-goal{background:rgba(22,163,74,.05);border-color:rgba(22,163,74,.14);}

/* GUIDE */
.guide-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.1rem;margin-bottom:10px;}
.guide-section h3{font-size:.88rem;font-weight:700;margin-bottom:.75rem;letter-spacing:-.02em;}
.guide-table{width:100%;border-collapse:collapse;font-size:.71rem;}
.guide-table th{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:.4rem .65rem;text-align:left;border-bottom:1px solid var(--border);}
.guide-table td{padding:.42rem .65rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.55;}
.guide-table tr:last-child td{border-bottom:none;}
.guide-chip{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:8px;font-family:'DM Mono',monospace;}
.pd-chip{background:rgba(74,222,128,.13);color:#4ade80;}
.pa-chip{background:rgba(234,179,8,.13);color:#ca8a04;}

/* SKILLS */
.skills-search{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:.7rem 1rem;outline:none;margin-bottom:10px;transition:border-color .2s;}
.skills-search:focus{border-color:var(--accent);}
.skill-cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.skill-cat-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:16px;font-size:.7rem;padding:.27rem .65rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.skill-cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.skill-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:.75rem;cursor:pointer;transition:all .18s;}
.skill-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.skill-card.done{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04);}
.skill-card.in-progress{border-color:rgba(234,179,8,.3);background:rgba(234,179,8,.04);}
.skill-hdr{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.skill-ico{font-size:1rem;flex-shrink:0;}
.skill-nm{font-size:.76rem;font-weight:600;flex:1;letter-spacing:-.01em;}
.skill-status{font-size:.65rem;font-family:'DM Mono',monospace;}
.skill-cat-tag{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.skill-bar-bg{background:var(--surface3);border-radius:3px;height:3px;overflow:hidden;margin-top:5px;}
.skill-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .8s ease;}
.skills-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.skill-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem;text-align:center;}
.skill-stat-val{font-size:1.4rem;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
.skill-stat-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}

/* HISTORY */
.hist-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.hf-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:16px;font-size:.68rem;padding:.27rem .65rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.hf-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.hist-item{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:.72rem .9rem;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.hist-ico{font-size:1.1rem;flex-shrink:0;}
.hist-info{flex:1;}
.hist-nm{font-size:.78rem;font-weight:600;}
.hist-sub{font-size:.67rem;color:var(--text2);margin-top:1px;}
.hist-st{font-size:.7rem;font-weight:700;flex-shrink:0;}
